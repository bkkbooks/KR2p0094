body:
  text: 麥卵麥卵有恆以旦毀雞卵入酒中前飲明飲二明飲三有更飲一明飲二明飲三如此盡卌二卵令人強益色美一曰八月取毚纑實陰乾乾析取其米冶以韋裹到春以牡牝鳥卵汁畚完如鼠矢陰乾入八完叔醬中以食一曰春日鳥卵一毀投糵糗中捖之如大牛戒蟣食多之善一曰已乾者一曰治陰以將漬其中
