body:
  text: 語語見三月吉日在禹乃入於房其狀變色甚雄以美乃若台壯羣河見之河月之治扣而見凡彼不溉蒿有英今人我須麋溉化血氣不足我無所樂欲毋言王有色昏有吾南河女子之不能已西河俞曰堅病而而不已恐過而不吾少河合麋睫其撞而問之以謁情故少河進合曰女子之樂有幼疾暴進暴退良氣不節禹曰善𢦏言歑我欲合氣男女蕃茲為之若何少河曰凡合氣之道必曰君何不羹茅必至思氣不禹曰善𢦏言今我血氣外揖艾取甚湛以實五賞石膏白端夜茨𣄴白雖賞登左下右亦毋暴成
