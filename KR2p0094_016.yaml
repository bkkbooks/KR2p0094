body:
  text: 便近內便近內為便近內方用癲棘根刌之長寸者二參善灑之有取全黑雄雞合翼成三雞之心胸以水二升洎故鐵鬵并煮之以雚堅稠節者爨之令大沸一即去其宰以其清煮黑騭犬卒歲以上者之心肺肝以雚堅稠節芵五物以以餔食食之多少次一曰近內烏豙大者四取車踐産之大把二氣車戔者以布橐若盛為欲用之即食之一曰治中者以汾囷始汾以出者取令見日陰乾之須其乾以稗五門冬二伏靈一即并搗漬以水令毚閹而沘取汁以漬汾囷亦令毚閹即出而乾之令盡其乾即冶參指最以半杯飲之
