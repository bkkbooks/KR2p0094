body:
  text: 醪利中醪利中取漆之莖少多等而其清汁四斗半之間為之若以釀之取熏烏豙八果取漆節之釀下善封其嬰口令之孰而以平一曰九斗先者二升其中十日冶從器出中服之百日令腸中毋病一曰為醪細斬漆節各一斗以水五浚以汁煮茈威有浚麥各一斗卒其時即浚黍稻各一斗并以汁修之如恆飯取烏豙三果乾疆五焦凡三物甫投之先置嬰中即釀黍其上汁均沃之有以美酒十斗沃之勿撓涂之十一孰矣即發勿釃稍清汁盡有以酒沃如此三而以餔食飲一咅已飲身𦡊養者靡之服之百日今目明耳葱末皆強病及偏枯
