body:
  text: 老不起老不起臭可和則乃下一曰以癲棘為漿方刌癲棘長寸節者三斗之以雚堅稠節者爨大沸止火沸定復爨之不欲如此二斗半以故瓦器盛為剛炊秫米二斗而足之氣孰旬寒即乾沃之居二日而槳節已近內而飲此漿一升漿侍其汁節漿以沃之令酸甘飲之雖使人即起漿所一曰漬烏矣有
