body:
  text: 除中益氣除中益氣茲肉肥膏者皆陰乾冶以三指最一一曰節者其樂以鳥澤舄𧁂酸棗等冶即以松脂和以為完後飯少多自一曰春秋時取冤陰乾冶之取冬葵種冶并之參指最益中一曰方風三等界當三物冶三指最後飯一曰取牛肉薄剶之即取萆芵寸者置牛肉中炊沸休有炊沸有休三而出肉食之臧汁及萆芵以復煮肉三而去之人環益強而不傷人食肉多少次殹一曰取白杬本陰乾而冶之以馬醬和丸大如指端空中張且大一曰滿冬蒁𦬸房風各冶之等并之一曰取桂二細辛四萩一戊厲一秦𣐹二三指最以為後飯令人強一曰如濕靡盛之飽食飲酒者臭之各善冶皆并三宿雄鷄血以繒之因以蓋以韋雄堅旬竹緩節者一節大徑三寸一曰以秋取螌首三之強一曰取強一曰汁置籥中牡鳥置水中飲之一曰以豬膏大如手令䗬淳曹四斗善冶節弗欲洒之一曰等亦以後飯一曰大牡兔皮去腸取萆蒵長四寸一把𦬸一把烏豙十削皮細析以大牡兔肉入藥間盡之乾勿令見日百日裹以三指最一為後飯百日支六七歲食之可也次所用一曰取細辛乾菌桂烏豙凡四物各冶之細辛四乾菌桂烏豙各二并之三指最以為後飯益氣有令人免澤一曰取白苻紅符伏霝各二兩十果桂三尺皆各冶之以美醯二斗和之即取刑馬膂肉十善脯之令薄如手三指即漬之醯中反復挑之即屚之已屚陰乾𥠜之㵒有復漬𥠜如前盡汁而已𥠜之脩即以椎薄段之令澤復𥠜之令澤桼䰍之乾即善臧之朝日晝夕食食各三寸皆先飯各冶等以為後飯
