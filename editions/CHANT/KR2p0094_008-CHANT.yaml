body:
  text: 治治取雄鷄一產搣谷之陰乾而冶多少如鷄令大如藥其汁漬脯三日食脯四寸六十五一曰取黃蜂駘廿置一桮醴中日中飲之一十易一曰取黃蜂百以美醬一桮漬一日一夜而出以汁漬疸糗九分升二誨食以酒飲三指最一曰平陵呂樂道贏中蟲陰乾冶欲廿用七最欲十用三最酒一桮
