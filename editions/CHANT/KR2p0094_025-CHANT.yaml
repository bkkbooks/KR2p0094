body:
  text: 益壽益壽谷名有泰室少室其中有石名曰駢石取小者病益壽取刑馬脫脯之段烏豙一升以淳酒漬之去其宰輿釁冬各萆薢牛膝各五莢桔梗厚二尺烏豙十果并冶以淳酒四斗漬之毋去其宰以盡之以韋橐裹食以二指最為後飯服之六末強益壽冶雲母銷消松脂等并以麥䵂捖之勿手令大如酸棗之吞一垸日益一垸至十日日後日捐一垸至十日日益損令人壽不老
