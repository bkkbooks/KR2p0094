body:
  text: 巾巾取雞毚能卷者産搣盡去毛遺兩翼之末而係縣竿雞靡逢房一大者令蜂蠚之厭有徙之令以蠚死死即挩去其其肌善冶以布麗之已而以邑棗之脂辨之而以布巾即以巾靡足四五乃復以二巾為卒足者少氣此令人多氣一曰治巾取楊思一升赤蛾一升螌草以美半斗并漬之奄其汁以漬細布一尺已漬𥠜之乾復漬汁盡即取穀椅桐汁所漬布乾之即善臧之節用之操以循玉策馬因驚矣楊思者狀如小而人一曰蛇牀泰半參本二斗半潘石三指最一桂尺者五廷之菩半者一以三月莤孰煮令沸而以布巾曼其汁且為之之令膚急毋有令男子足一曰取萩莢二冶之以水一參沃之善挑即漬巾中卒其時而𢩭之乾輒復漬一曰陰乾牡鼠腎冶取邑鳥卵潰并以塗新布巾卧以抿男女一曰取岪選一斗二分之以酨漬一分而暴之冬日置竈上令極沸即出岪選餘如前即以漬巾盡其汁已卧而漬巾以抿男令牝亦一曰螺四斗美洛四斗天牡四分升一桃可大如棗牡螻首二七半升并漬洛中已取汁以布漬汁盡而已用之濕操玉莢則馬驁矣所胃天牡者食桃李華者殹桃可者桃實小時毛殹牡螻者頡蠸者殹者狀如贛皮一曰燔柎張巾其有以巾抏牝馬毚
