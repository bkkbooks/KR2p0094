body:
  text: 勺勺曰以五月望取勃螺漬布中陰乾以熱易一曰取乾桂要苕蛇牀皆冶之各等以𧖅若棗脂和丸大如指端裹以疏布入中熱細一曰五月取𧉸螺三斗桃實二斗并撓盛以缶沃以美三斗蓋涂貍竈中令三寸杜上令與地平炊上晝日而火不絶四日出閭棄其滓以汁染布三尺陰乾輒復染汁索善裹布勿令粗用取大如掌竄鼻空小養而熱以據臂臂大養堅熱勿令獲面獲面養不可支殹為布多小以此衰之
