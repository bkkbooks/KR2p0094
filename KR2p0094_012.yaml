body:
  text: 益甘益甘伏霝去滓以汁肥豯以食女子令益甘中美取牛腮燔冶之乾菌桂皆并囊盛之以醯漬之入中一曰汁以牛若鹿䏔殽令女子自罙入其戒一曰削豫木去其上箁亞者而卒斬之以水煮氣而清取汁去其涿者復煮其清令渴乾則下如食頃以水灑支七八嘗一曰取鳥産不鷇者以一食其四而陰乾乾即
