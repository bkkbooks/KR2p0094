body:
  text: 天下宗有氣則產無氣則死是怒而不大者據不至也大而不堅者筋不至也堅而不熱者氣不至也據不至而用則腄筋不至而用則避氣不至而用則隋是以聖人必之湯斿於搖臺陳於南宮問男女之齊至相當毋傷於身者若可合曰益產者食也損產者色也是以聖人必有法廁一曰麇桷二爰據三曰蟬傅四曰蟾者五曰魚六曰青靈七曰兔敄騖一曰云石二曰𢫈瓠三曰濯昏四伏五曰一曰高之二曰下之三曰左之四曰右之五曰深之六曰淺之一曰疢二曰一曰二曰震撞一曰定味二曰致氣三曰勞實四曰侍節
